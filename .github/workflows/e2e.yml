name: E2E Tests

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: e2e-dummy-key
      NEXT_PUBLIC_APP_URL: http://localhost:3001
      CI: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: |
          supabase start
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(supabase status --output env | grep '^PUBLISHABLE_KEY=' | cut -d'"' -f2)" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status --output env | grep '^SERVICE_ROLE_KEY=' | cut -d'"' -f2)" >> $GITHUB_ENV

      - name: Install Playwright browsers
        run: pnpm --filter nexvoy-web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter nexvoy-web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop
